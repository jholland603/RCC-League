<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Standings — RCC Men's Twilight League 2026</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/standings.css">
</head>
<body>

  <div id="site-header"></div>

  <main>
    <div class="selector-panel">
      <div class="field-group" style="flex:1;">
        <label for="weekSelect">View Standings For</label>
        <select id="weekSelect" style="width:100%;">
          <option value="current">Current (latest)</option>
        </select>
      </div>
    </div>
    <div id="lastUpdated" class="last-updated"></div>
    <div id="standingsWrap" class="standings-wrap">
      <div class="empty-state" style="grid-column:1/-1;">
        <div class="big-icon">⛳</div>
        <p>Loading standings…</p>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/common.js"></script>
  <script src="js/standings.js"></script>
</body>
</html>
