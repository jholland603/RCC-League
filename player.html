<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Comparison — RCC Men's Twilight League 2026</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/player.css">
</head>
<body>

  <div id="site-header"></div>

  <main>
    <a href="stats.html" class="back-link" id="backLink">&larr; Back to Stats</a>

    <div class="selector-panel">
      <div class="field-group" style="flex:1;">
        <label for="playerSelect">Player</label>
        <select id="playerSelect" style="width:100%;">
          <option value="">— Select a player —</option>
        </select>
      </div>
      <div class="field-group" style="flex:1;">
        <label for="compareSelect">Compare With</label>
        <select id="compareSelect" style="width:100%;">
          <option value="__league_avg__">League Average</option>
        </select>
      </div>
    </div>

    <div id="playerCard" class="player-card"></div>

    <div id="emptyState" class="empty-state">
      <div class="big-icon">⛳</div>
      <p>Select a player to view their comparison</p>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="js/common.js"></script>
  <script src="js/player.js"></script>
</body>
</html>
