<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RCC Men's Twilight League 2026</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    /* ── INDEX-ONLY STYLES ── */
    .index-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem 2rem 3rem;
      width: 100%;
    }

    /* ── NAV CARDS ── */
    .section-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--green-pale);
      opacity: 0.7;
      margin-bottom: 1rem;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    /* ── LEADERBOARD ── */
    .lb-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .lb-panel {
      background: var(--white);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .lb-header {
      background: var(--green-mid);
      padding: 0.85rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .lb-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1rem;
      color: var(--cream);
    }

    .lb-panel-link .lb-table tbody tr:hover {
      background: transparent;
      cursor: default;
    }
      text-decoration: none;
      display: block;
      border-radius: var(--radius-lg);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .lb-panel-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(26,46,28,0.18);
    }

    .lb-panel-link:hover .lb-header {
      background: var(--green);
    }

    .lb-header-hint {
      font-size: 0.72rem;
      color: var(--green-pale);
      opacity: 0.8;
    }

    table.lb-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    table.lb-table tbody tr {
      border-bottom: 1px solid var(--cream-dark);
      cursor: pointer;
      transition: background 0.1s;
    }

    table.lb-table tbody tr:last-child { border-bottom: none; }
    table.lb-table tbody tr:hover { background: var(--cream); }

    table.lb-table tbody td {
      padding: 0.5rem 1rem;
      vertical-align: middle;
    }

    .lb-rank {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--text-muted);
      width: 28px;
      text-align: right;
    }
    .lb-rank.gold   { color: var(--gold); font-weight: 600; }
    .lb-rank.silver { color: #888; font-weight: 600; }
    .lb-rank.bronze { color: #a0522d; font-weight: 600; }

    .lb-team { font-weight: 500; color: var(--text); font-size: 0.82rem; }
    .lb-team-num { font-size: 0.68rem; color: var(--text-muted); font-family: 'DM Mono', monospace; }

    .lb-pts {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      text-align: right;
      color: var(--text-mid);
    }

    .lb-rec {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      text-align: right;
      white-space: nowrap;
      color: var(--text-muted);
    }

    .lb-updated {
      font-size: 0.68rem;
      color: var(--green-pale);
      opacity: 0.5;
      text-align: center;
      padding: 0.6rem;
      letter-spacing: 0.04em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 800px) {
      .lb-grid   { grid-template-columns: 1fr; }
      .cards-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .index-wrap { padding: 1rem 1rem 2rem; }
      .cards-grid { grid-template-columns: 1fr; gap: 0.75rem; }
    }
  </style>
</head>
<body>

  <div id="site-header"></div>

  <div class="index-wrap">

    <div class="section-label">Top 5 — Current Standings</div>
    <div class="lb-grid" id="lbGrid">
      <div class="lb-panel"><div class="lb-updated">Loading…</div></div>
      <div class="lb-panel"><div class="lb-updated">Loading…</div></div>
    </div>
    <div id="lbUpdated" class="lb-updated" style="margin-bottom:1.75rem;"></div>

    <div class="section-label" style="margin-bottom:0.75rem;">League Pages</div>
    <div class="cards-grid" style="margin-bottom:1.75rem;">
      <a class="nav-card" href="schedule.html">
        <span class="card-icon">📅</span>
        <div class="card-title">Schedule</div>
        <div class="card-desc">Full 16-round schedule, scores, and stroke allocations.</div>
        <span class="card-arrow">↗</span>
      </a>
      <a class="nav-card" href="stats.html">
        <span class="card-icon">📊</span>
        <div class="card-title">Player Stats</div>
        <div class="card-desc">Individual leaderboards — birdies, scoring average, and more.</div>
        <span class="card-arrow">↗</span>
      </a>
    </div>

  </div>

  <div id="site-footer"></div>

  <script src="js/common.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
