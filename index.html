<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RCC Men's Twilight League 2026</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    /* ── INDEX-ONLY STYLES ── */
    .index-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem 2rem 3rem;
      width: 100%;
    }

    /* ── NAV CARDS ── */
    .section-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--green-pale);
      opacity: 0.7;
      margin-bottom: 1rem;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    /* ── LEADERBOARD ── */
    .lb-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .lb-panel {
      background: var(--white);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .lb-header {
      background: var(--green-mid);
      padding: 0.85rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .lb-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1rem;
      color: var(--cream);
    }

    .lb-header a {
      font-size: 0.72rem;
      color: var(--green-pale);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.15s;
    }

    .lb-header a:hover { opacity: 1; }

    table.lb-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    table.lb-table tbody tr {
      border-bottom: 1px solid var(--cream-dark);
      cursor: pointer;
      transition: background 0.1s;
    }

    table.lb-table tbody tr:last-child { border-bottom: none; }
    table.lb-table tbody tr:hover { background: var(--cream); }

    table.lb-table tbody td {
      padding: 0.5rem 1rem;
      vertical-align: middle;
    }

    .lb-rank {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--text-muted);
      width: 28px;
      text-align: right;
    }
    .lb-rank.gold   { color: var(--gold); font-weight: 600; }
    .lb-rank.silver { color: #888; font-weight: 600; }
    .lb-rank.bronze { color: #a0522d; font-weight: 600; }

    .lb-team { font-weight: 500; color: var(--text); font-size: 0.82rem; }
    .lb-team-num { font-size: 0.68rem; color: var(--text-muted); font-family: 'DM Mono', monospace; }

    .lb-pts {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      text-align: right;
      color: var(--text-mid);
    }

    .lb-rec {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      text-align: right;
      white-space: nowrap;
      color: var(--text-muted);
    }

    .lb-updated {
      font-size: 0.68rem;
      color: var(--green-pale);
      opacity: 0.5;
      text-align: center;
      padding: 0.6rem;
      letter-spacing: 0.04em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 800px) {
      .lb-grid   { grid-template-columns: 1fr; }
      .cards-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .index-wrap { padding: 1rem 1rem 2rem; }
      .cards-grid { grid-template-columns: 1fr; gap: 0.75rem; }
    }
  </style>
</head>
<body>

  <div id="site-header"></div>

  <div class="index-wrap">

    <div class="section-label" style="margin-bottom:0.75rem;">League Pages</div>
    <div class="cards-grid" style="margin-bottom:1.75rem;">
      <a class="nav-card" href="standings.html">
        <span class="card-icon">🏆</span>
        <div class="card-title">Standings</div>
        <div class="card-desc">Flight standings and team rankings.</div>
        <span class="card-arrow">↗</span>
      </a>
      <a class="nav-card" href="schedule.html">
        <span class="card-icon">📅</span>
        <div class="card-title">Schedule</div>
        <div class="card-desc">Full 16-round schedule, scores, and stroke allocations.</div>
        <span class="card-arrow">↗</span>
      </a>
      <a class="nav-card" href="stats.html">
        <span class="card-icon">📊</span>
        <div class="card-title">Player Stats</div>
        <div class="card-desc">Individual leaderboards — birdies, scoring average, and more.</div>
        <span class="card-arrow">↗</span>
      </a>
    </div>

    <div class="section-label">Top 10 — Current Standings</div>
    <div class="lb-grid" id="lbGrid">
      <div class="lb-panel"><div class="lb-updated">Loading…</div></div>
      <div class="lb-panel"><div class="lb-updated">Loading…</div></div>
    </div>
    <div id="lbUpdated" class="lb-updated"></div>

  </div>

  <div id="site-footer"></div>

  <script src="js/common.js"></script>
  <script>
    // ── INDEX LEADERBOARD ──────────────────────────────────────────────────────

    function buildRankMap(teamPoints) {
      const sorted = [...teamPoints].sort((a, b) => b.pts - a.pts);
      const map = {};
      let rank = 1;
      sorted.forEach((item, i) => {
        if (i > 0 && item.pts === sorted[i - 1].pts) {
          map[item.num] = `T${rank}`;
          map[sorted[i - 1].num] = `T${rank}`;
        } else {
          rank = i + 1;
          map[item.num] = String(rank);
        }
      });
      return map;
    }

    function calcRecords(data) {
      const { schedule, round_scores } = data;
      const records = {};
      data.teams.forEach(t => { records[t.team_number] = { w:0, l:0, t:0 }; });
      Object.keys(schedule).forEach(roundKey => {
        const rndNum = getRoundNumber(roundKey);
        schedule[roundKey].forEach(([a, b]) => {
          const as = (round_scores[String(a)] || {})[String(rndNum)];
          const bs = (round_scores[String(b)] || {})[String(rndNum)];
          if (as === undefined || bs === undefined) return;
          if      (as > bs) { records[a].w++; records[b].l++; }
          else if (bs > as) { records[b].w++; records[a].l++; }
          else              { records[a].t++; records[b].t++; }
        });
      });
      return records;
    }

    function renderFlight(flight, teams, records) {
      const icon     = flight === 'Sunshine' ? '☀' : '🍭';
      const sorted   = [...teams].sort((a, b) => b.total_points - a.total_points);
      const rankMap  = buildRankMap(teams.map(t => ({ num: t.team_number, pts: t.total_points })));

      // top 10 + any ties at the cutoff
      const cutoff   = sorted[Math.min(9, sorted.length - 1)]?.total_points;
      const top      = sorted.filter(t => t.total_points >= cutoff);

      const rows = top.map(team => {
        const rankStr  = rankMap[team.team_number];
        const rankNum  = parseInt(rankStr.replace('T', ''));
        const rankCls  = rankNum === 1 ? 'gold' : rankNum === 2 ? 'silver' : rankNum === 3 ? 'bronze' : '';
        const rec      = records[team.team_number] || { w:0, l:0, t:0 };
        const recStr   = rec.t > 0 ? `${rec.w}-${rec.l}-${rec.t}` : `${rec.w}-${rec.l}`;

        return `<tr onclick="goToSchedule('${flight}', ${team.team_number})">
          <td class="lb-rank ${rankCls}">${rankStr}</td>
          <td>
            <div class="lb-team">${team.players_display}</div>
            <div class="lb-team-num">T${team.team_number}</div>
          </td>
          <td class="lb-rec">${recStr}</td>
          <td class="lb-pts">${team.total_points}</td>
        </tr>`;
      }).join('');

      return `<div class="lb-panel">
        <div class="lb-header">
          <h2>${icon} ${flight}</h2>
          <a href="standings.html">Full standings ↗</a>
        </div>
        <table class="lb-table"><tbody>${rows}</tbody></table>
      </div>`;
    }

    function goToSchedule(flight, teamNum) {
      localStorage.setItem('rcc_team', String(teamNum));
      window.location.href = 'schedule.html';
    }

    loadLeagueData().then(data => {
      const records   = calcRecords(data);
      const sunshine  = data.teams.filter(t => t.flight === 'Sunshine');
      const lollipops = data.teams.filter(t => t.flight === 'Lollipops');

      document.getElementById('lbGrid').innerHTML =
        renderFlight('Sunshine',  sunshine,  records) +
        renderFlight('Lollipops', lollipops, records);

      const roundNums = Object.values(data.round_scores).flatMap(t => Object.keys(t).map(Number));
      if (roundNums.length) {
        const lastRound = Math.max(...roundNums);
        const roundKey  = Object.keys(data.schedule).find(k => getRoundNumber(k) === lastRound);
        const dateStr   = roundKey ? getRoundDate(roundKey) : '';
        document.getElementById('lbUpdated').textContent =
          `Through Round ${lastRound}${dateStr ? ' (' + dateStr + ')' : ''}`;
      }
    }).catch(() => {
      document.getElementById('lbGrid').innerHTML =
        `<div class="lb-panel"><div class="lb-updated">Could not load data.</div></div>`;
    });
  </script>
</body>
</html>
